<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<header>
    <h1>Formulario de Contacto</h1>
</header>
<main>
    <section>
       <a href="index.html">Volver</a>
       

       <form>
          <label for="nombre">Nombre: </label>
          <input type="text" id="nombre" name="nombre" placeholder="nombre" required minlength="3">
    

          <label for="email">Email: </label>
          <input type="email" id="email" name="email" placeholder="email"  required>
    

          <label for="telefono">Telefono: </label>
          <input type="tel" id="telefono" name="telefono"  placeholder="telefono" pattern="[0-9]{10}" required>
    

          <label for="motivo">Motivo: </label>
          <select id="motivo" name="motivo">
             <option value="">Seleccione...</option>
             <option value="consulta">Consulta</option>
             <option value="soporte">Soporte</option>
             <option value="otros">Otros</option>

    </select>
        <br><br>
        <label for="mensaje">Mensaje: </label>
        <textarea id="mensaje" name="mensaje" placeholder="Escribir tu mensaje"  required minlength="10" ></textarea>
        <br><br>

<div class="terminos">
     <input type="checkbox" id="terminos" name= "terminos" required>
     <label for="terminos">Acepto los terminos</label>
</div>

<button type="submit">Enviar</button>
  
   </form>
   </section>

</main>
<footer>
    <p>&copy; 2026 Luciano Posada TODOS LOS DERECHOS RESERVADOS</p>
</footer>
</body>
</html>
